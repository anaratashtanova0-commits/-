<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Landing Page</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.container{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:250px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    font-size:24px;
    color:#2e8b57;
    margin:15px 0;
    font-weight:bold;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}
</style>
</head>
<body>

<h1>Product Landing Page</h1>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500" alt="Laptop">
        <h2>Laptop</h2>
        <p class="price">$800</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500" alt="Phone">
        <h2>Phone</h2>
        <p class="price">$500</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Headphones">
        <h2>Headphones</h2>
        <p class="price">$120</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
